# Developer overlay — build the collector and Grafana images from source instead
# of pulling the published ones. Layer it on top of the base stack:
#
#   docker compose -f compose.yaml -f compose.dev.yaml up -d --build
#
# Rebuild just Grafana after editing the dashboard (fast — only file layers):
#
#   docker compose -f compose.yaml -f compose.dev.yaml up -d --build grafana
#
# The base compose.yaml alone pulls the published images, so normal users never
# need this file.

services:
  collector:
    image: automower-collector:local
    build: ./collector

  grafana:
    image: automower-grafana:local
    build: ./grafana
