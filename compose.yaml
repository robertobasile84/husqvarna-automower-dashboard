# Automower dashboard — collector + InfluxDB + Grafana.
#
# This file is self-contained: it pulls three published multi-arch images
# (collector + Grafana, both with everything baked in, plus stock InfluxDB) and
# mounts nothing from disk. So it's the only file you need — grab it and run:
#
#     docker compose up -d
#
# With no Husqvarna credentials set, the collector runs in DEMO mode and feeds
# the dashboard synthetic data — so you can see it working before wiring up a
# real mower. Add credentials in a .env next to this file for real data.
#
# Developers building from source use compose.dev.yaml (see the repo).
#
# NOTE: the default passwords/token below are for local testing ONLY. Set your
# own in .env before deploying anywhere that matters.

services:
  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-automower-dev}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-automower}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-automower}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUXDB_RETENTION:-0s}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-automower-dev-token}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  collector:
    # Pulls the published multi-arch image, so a fresh user only needs
    # `docker compose up -d` — no local build, no source checkout required.
    # Developers can build from source with the dev overlay:
    #   docker compose -f compose.yaml -f compose.dev.yaml up -d --build
    image: ${COLLECTOR_IMAGE:-ghcr.io/robertobasile84/automower-collector:latest}
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      # Leave these empty to run in DEMO mode (synthetic data, no account needed).
      HUSQVARNA_CLIENT_ID: ${HUSQVARNA_CLIENT_ID:-}
      HUSQVARNA_CLIENT_SECRET: ${HUSQVARNA_CLIENT_SECRET:-}
      DEMO_MODE: ${DEMO_MODE:-}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-automower-dev-token}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-automower}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-automower}
      REST_POLL_INTERVAL: ${REST_POLL_INTERVAL:-3600}
      WRITE_POSITIONS: ${WRITE_POSITIONS:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  grafana:
    # Custom image: stock Grafana + this project's dashboard, datasource, and
    # provisioning baked in (built from ./grafana). Nothing to mount, and
    # dashboard updates ship as a new image tag. Override GRAFANA_IMAGE to pin a
    # specific version; devs building from source use compose.dev.yaml.
    image: ${GRAFANA_IMAGE:-ghcr.io/robertobasile84/automower-grafana:latest}
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
      # Anonymous, read-only (Viewer) access — on by default so the demo lands
      # straight on the dashboard with no login. The admin login still works for
      # editing. Set GRAFANA_ANONYMOUS=false to require a login (e.g. if you
      # expose Grafana without a network-level auth layer in front of it).
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS:-true}
      GF_AUTH_ANONYMOUS_ORG_ROLE: ${GRAFANA_ANONYMOUS_ROLE:-Viewer}
      # Consumed by the baked-in provisioned datasource.
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-automower-dev-token}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-automower}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-automower}
      # Position-map center. The image stamps these into the dashboard at start.
      # Defaults to the demo location (Zürich) — set in .env to center on your lawn.
      MAP_LAT: ${MAP_LAT:-47.377}
      MAP_LON: ${MAP_LON:-8.5417}
      MAP_ZOOM: ${MAP_ZOOM:-17}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3005}:3000"

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
